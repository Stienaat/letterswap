<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Letterswap</title>
	<link rel="stylesheet" href="lswap.css" />
	
	<meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="icons/icon-192b.png">
    <link rel="manifest" href="manifest.json">
	<script src="i18n.js"></script>
</head>

<body>
 
<main class="container">
	<h2 style="margin:0px">Letterswap</h2>
	
	<div class="game-wrapper">
		<div class="toolbar">						
				<span id="lev1" class="tooltekst"></span>
				<span id="lev2" class="tooltekst"></span>
				<span id="lev3" class="tooltekst"></span>		
				<span id="lev4" class="tooltekst"></span>
				<span id="lev5" class="tooltekst"></span>						
		</div>

		<div class="toolbar2">	
			<div class="icons">
				<button id="jokerBtn" class="icon-btn">
					<img src="images/joker.png" alt="Joker"></button>

				<button id="newGameBtn" class="icon-btn">
					<img src="images/new.png" alt="Nieuw"></button>

				<button id="solutionBtn" class="icon-btn">
					<img src="images/oog.png" alt="Oplossing"></button>

				<button id="langBtn" class="icon-btn">
					<img src="images/NL.png" alt="Taal"></button>

				<button id="readmeBtn" class="icon-btn">
					<img src="images/info.png" alt="Info"></button>
			</div>
		</div>
		<div id="messageBar" >
			<div id="messageText" ;>Hoe speel je dit? → Klik op info.</div>
			<div id="messageExtra"></div>
		</div>
		<div id="toolbar3" ;>
			<div><span id="Faults">Strafpt'n: 0</span></div>
			<div><span id="Topscore">Topscore: 0</span></div>
			<div><span id="Timer">T: 00:00</span></div>
		</div>

	    <div id="grid">
			<div class="cell">
				<span class="cell-letter">A</span>
			</div>

		</div>
		<div id="board"></div>		
		<div id="letterFlyOverlay" class="fly-overlay"></div>

	
	<div class="toolbar4">
			<img src="images/logoFS.png" alt="FS Creations">
			<h6 style="font-weight: normal; font-style:italic; margin: 0px;"> © 2026 FS creations. All rights reserved. Not for commercial use.</h6>
		</div>	
 		
	</div>
</main>

<canvas id="fireworksCanvas" class="hidden"></canvas>

<!-- Modal -->
<div id="modal" class="hidden">
    <div id="modalContent">
	
		<img style="height: 30px;" src="images/logoFS.png" alt="FS Creations"><h6>V1.2</h6>
		<button id="modalClose" style="margin:10px";><img src="images/sluiten.png" alt="close"></button>	
        <div id="modalBody"></div>
			
    </div>
</div>


<script src="lswap.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./serviceworker.js");
  }
</script>

<div id="debugPanel" style="
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.75);
    color: #0f0;
    font-family: monospace;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    z-index: 9999;
    display: none;
">
</div>



</body>
</html>
